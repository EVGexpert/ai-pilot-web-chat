<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat Layout — AI Pilot Design</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script type="module" src="/src/main.js"></script>
  </head>
  <body class="bg-chat-bg h-screen overflow-hidden p-5">
    <div class="flex gap-5 h-full">
      <!-- Sidebar -->
      <aside
        class="w-72 shrink-0 bg-white flex flex-col rounded-2xl overflow-hidden py-5 px-4"
      >
        <div class="side-header space-y-5">
          <div class="flex justify-between">
            <img
              src="img/logo-aipilot-v3.png"
              class="size-16 shrink-0"
              alt="AI Pilot"
            />

            <img
              src="img/icon-frame.svg"
              class="open-close size-5 shrink-0"
              alt="close"
            />
          </div>
          <!-- Поиск -->
          <div class="relative">
            <svg
              class="absolute left-3 top-1/2 -translate-y-1/2 size-5 text-gray-400"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z"
              />
            </svg>
            <input
              type="text"
              placeholder="Поиск"
              class="w-full py-2 pl-10 pr-4 bg-gray-100 border-0 rounded-xl text-gray-700 placeholder-gray-400 shadow-sm focus:outline-none focus:ring-2 focus:ring-accent/50"
            />
          </div>
        </div>
      </aside>

      <!-- Main area -->
      <main class="flex-1 flex flex-col min-w-0"></main>
    </div>
  </body>
</html>
