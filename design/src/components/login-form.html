<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Form — AI Pilot Design</title>
  <link rel="stylesheet" href="/src/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    .demo-wrap { max-width: 400px; margin: 0 auto; padding: 2rem; }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
  <nav class="sticky top-0 z-10 bg-slate-950/80 backdrop-blur border-b border-slate-800 px-4 py-2">
    <a href="/" class="text-sm text-slate-400 hover:text-blue-400 transition-colors">← Назад к списку</a>
  </nav>

  <div class="demo-wrap space-y-8">
    <h2 class="text-lg font-semibold text-slate-300">🔐 Login Form — состояния</h2>

    <!-- Пустая форма -->
    <div>
      <p class="text-xs text-slate-500 mb-3">Обычная форма</p>
      <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6">
        <div class="text-center mb-6">
          <div class="w-14 h-14 mx-auto mb-3 rounded-2xl bg-blue-500/15 text-blue-400 flex items-center justify-center">
            <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
            </svg>
          </div>
          <h1 class="text-xl font-bold text-slate-100">AI Pilot</h1>
          <p class="text-sm text-slate-500 mt-1">Войдите для управления сайтами</p>
        </div>

        <div class="space-y-4">
          <div>
            <label class="block text-xs font-medium text-slate-400 mb-1.5">Email</label>
            <input type="email" placeholder="mail@example.com"
                   class="w-full bg-slate-800/50 border border-slate-700/60 text-sm text-slate-100 placeholder-slate-500 rounded-xl px-4 py-2.5 outline-none focus:border-blue-500/50 focus:ring-1 focus:ring-blue-500/20 transition-colors" />
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-400 mb-1.5">Пароль</label>
            <input type="password" placeholder="••••••••"
                   class="w-full bg-slate-800/50 border border-slate-700/60 text-sm text-slate-100 placeholder-slate-500 rounded-xl px-4 py-2.5 outline-none focus:border-blue-500/50 focus:ring-1 focus:ring-blue-500/20 transition-colors" />
          </div>
          <button class="w-full py-2.5 bg-blue-600 hover:bg-blue-500 text-white text-sm font-medium rounded-xl transition-colors cursor-pointer">
            Войти
          </button>
        </div>
      </div>
    </div>

    <!-- С ошибкой -->
    <div>
      <p class="text-xs text-slate-500 mb-3">С ошибкой валидации</p>
      <div class="bg-slate-900 border border-red-500/30 rounded-2xl p-6 ring-1 ring-red-500/10">
        <div class="text-center mb-6">
          <div class="w-14 h-14 mx-auto mb-3 rounded-2xl bg-red-500/15 text-red-400 flex items-center justify-center">
            <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/>
            </svg>
          </div>
          <h1 class="text-xl font-bold text-slate-100">AI Pilot</h1>
          <p class="text-sm text-slate-500 mt-1">Войдите для управления сайтами</p>
        </div>

        <div class="mb-3 p-3 bg-red-500/10 border border-red-500/20 rounded-xl">
          <p class="text-xs text-red-300">Неверный email или пароль. Попробуйте снова.</p>
        </div>

        <div class="space-y-4">
          <div>
            <label class="block text-xs font-medium text-slate-400 mb-1.5">Email</label>
            <input type="email" value="admin@test"
                   class="w-full bg-slate-800/50 border border-red-500/40 text-sm text-slate-100 rounded-xl px-4 py-2.5 outline-none focus:border-red-500/50 focus:ring-1 focus:ring-red-500/20 transition-colors" />
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-400 mb-1.5">Пароль</label>
            <input type="password" value="wrong"
                   class="w-full bg-slate-800/50 border border-red-500/40 text-sm text-slate-100 rounded-xl px-4 py-2.5 outline-none focus:border-red-500/50 focus:ring-1 focus:ring-red-500/20 transition-colors" />
          </div>
          <button class="w-full py-2.5 bg-red-600/50 text-white/60 text-sm font-medium rounded-xl cursor-not-allowed transition-colors" disabled>
            Войти
          </button>
        </div>
      </div>
    </div>

    <!-- Загрузка -->
    <div>
      <p class="text-xs text-slate-500 mb-3">Загрузка</p>
      <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 opacity-70">
        <div class="text-center mb-6">
          <div class="w-14 h-14 mx-auto mb-3 rounded-2xl bg-blue-500/15 text-blue-400 flex items-center justify-center">
            <svg class="w-7 h-7 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
            </svg>
          </div>
          <h1 class="text-xl font-bold text-slate-100">AI Pilot</h1>
          <p class="text-sm text-slate-500 mt-1">Выполняется вход…</p>
        </div>
        <div class="space-y-4">
          <div>
            <label class="block text-xs font-medium text-slate-400 mb-1.5">Email</label>
            <input type="email" value="admin123@pilot.ru" disabled
                   class="w-full bg-slate-800/30 border border-slate-800 text-sm text-slate-500 rounded-xl px-4 py-2.5 outline-none cursor-not-allowed" />
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-400 mb-1.5">Пароль</label>
            <input type="password" value="••••••••" disabled
                   class="w-full bg-slate-800/30 border border-slate-800 text-sm text-slate-500 rounded-xl px-4 py-2.5 outline-none cursor-not-allowed" />
          </div>
          <button class="w-full py-2.5 bg-blue-600/50 text-white/60 text-sm font-medium rounded-xl cursor-not-allowed transition-colors" disabled>
            <span class="flex items-center justify-center gap-2">
              <svg class="w-4 h-4 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
              </svg>
              Вход…
            </span>
          </button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
