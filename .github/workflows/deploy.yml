name: Auto Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}
          log-public-key: false

      - name: Add host to known_hosts
        run: ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Test SSH
        run: ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "echo 'SSH works!'"

      - name: Git Pull
        run: ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "cd ~/ai-pilot-web-chat && git fetch origin && git reset --hard origin/main"

      - name: Docker Build
        run: ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "cd ~/ai-pilot-web-chat && docker build -t ai-pilot-chat ."

      - name: Docker Deploy
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            docker network create aipilot 2>/dev/null || true
            docker rm -f ai-pilot-chat 2>/dev/null || true
            docker run -d \
              --name ai-pilot-chat \
              --restart unless-stopped \
              --network aipilot \
              --add-host host.docker.internal:host-gateway \
              -p 127.0.0.1:3000:80 \
              ai-pilot-chat
            docker image prune -f
            echo "✅ Deployed!"
          EOF
