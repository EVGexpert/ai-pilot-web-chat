name: Auto Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          timeout: 180s
          script: |
            set -e
            cd ~/ai-pilot-web-chat

            # === 1. Graceful stop auth-api (SIGTERM → sql.js save → диск) ===
            echo "🛑 Graceful shutdown auth-api..."
            docker stop -t 30 ai-pilot-auth 2>/dev/null || true
            docker rm ai-pilot-auth 2>/dev/null || true

            # === 2. Graceful stop web-chat ===
            docker stop -t 10 ai-pilot-chat 2>/dev/null || true
            docker rm ai-pilot-chat 2>/dev/null || true

            # === 3. Backup (после graceful stop — данные уже на диске) ===
            echo "📦 Backing up auth database..."
            BACKUP_DIR="/root/aipilot-backups"
            mkdir -p "$BACKUP_DIR"
            if [ -f /root/ai-pilot-web-chat/auth-data/aipilot.db ]; then
              cp /root/ai-pilot-web-chat/auth-data/aipilot.db "$BACKUP_DIR/pre-deploy-$(date +%Y%m%d-%H%M%S).db"
              echo "   ✅ Backup created"
            else
              echo "   ⚠️  No existing DB to backup"
            fi
            # Keep last 7 backups
            ls -t "$BACKUP_DIR"/*.db 2>/dev/null | tail -n +8 | xargs rm -f 2>/dev/null || true

            # === 4. Обновление кода (без stash — данные уже сохранены) ===
            echo "📥 Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            # Docker сеть
            docker network create aipilot 2>/dev/null || true

            # === 5. Auth API ===
            echo "🔧 Building auth-api..."
            docker build -t ai-pilot-auth auth-api/
            docker run -d \
              --name ai-pilot-auth \
              --restart unless-stopped \
              --network aipilot \
              --add-host host.docker.internal:host-gateway \
              -p 127.0.0.1:3001:3001 \
              -v /root/ai-pilot-web-chat/auth-data:/app/data \
              -e PORT=3001 \
              -e JWT_SECRET=dev-jwt-secret-change-in-production \
              -e GATEWAY_TOKEN=f8186e8d77460feeb735a8dbc48e659c9b05c7f10b114fd554d6fd7a8f8e76e3 \
              -e GATEWAY_WS=ws://host.docker.internal:18789 \
              -e APP_URL=https://pilotsite.ru \
              ai-pilot-auth

            # === 6. Healthcheck auth-api ===
            echo "⏳ Waiting for auth-api healthcheck..."
            for i in $(seq 1 15); do
              sleep 2
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/api/stats 2>/dev/null || echo "000")
              echo "   Attempt $i: HTTP $STATUS"
              if [ "$STATUS" = "200" ]; then break; fi
            done

            # === 7. Проверка БД ===
            echo "🔍 Checking database integrity..."
            USERS=$(curl -s http://localhost:3001/api/stats | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('users',0))" 2>/dev/null || echo "0")
            echo "   Users in DB: $USERS"
            if [ "$USERS" = "0" ]; then
              echo "⚠️  WARNING: Database is empty! Attempting rollback..."
              LATEST_BACKUP=$(ls -t "$BACKUP_DIR"/*.db 2>/dev/null | head -1)
              if [ -n "$LATEST_BACKUP" ] && [ -f "$LATEST_BACKUP" ]; then
                echo "   Restoring from $LATEST_BACKUP ($(du -h "$LATEST_BACKUP" | cut -f1))"
                docker stop -t 5 ai-pilot-auth 2>/dev/null || true
                cp "$LATEST_BACKUP" /root/ai-pilot-web-chat/auth-data/aipilot.db
                docker start ai-pilot-auth 2>/dev/null || true
                sleep 3
                AFTER=$(curl -s http://localhost:3001/api/stats | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('users',0))" 2>/dev/null || echo "0")
                echo "   Users after rollback: $AFTER"
              else
                echo "⚠️  No backup found — database is clean (first deploy or manual wipe)"
              fi
            else
              echo "✅ Database OK: $USERS users"
            fi

            # === 8. Веб-чат ===
            echo "🔧 Building web-chat..."
            docker build -t ai-pilot-chat .
            docker run -d \
              --name ai-pilot-chat \
              --restart unless-stopped \
              --network aipilot \
              --add-host host.docker.internal:host-gateway \
              -p 127.0.0.1:3000:80 \
              ai-pilot-chat

            # === 9. Cleanup ===
            docker image prune -f
            echo "✅ Deploy complete: $(date)"

            # === 10. Deploy report ===
            FINAL_USERS=$(curl -s http://localhost:3001/api/stats | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('users',0), d.get('sites',0), d.get('sessions',0))" 2>/dev/null || echo "? ? ?")
            echo "📊 Report — DB: users sites sessions = $FINAL_USERS"
