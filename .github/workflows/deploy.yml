name: Auto Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Test SSH Connection
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          timeout: 30
          host_key_checking: false
          protocol: tcp
          script: |
            echo "✅ SSH connection successful"
            whoami
            pwd

      - name: Deploy via SSH
        if: success()
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          timeout: 120
          host_key_checking: false
          protocol: tcp
          script: |
            set -e
            echo "🚀 Starting deployment..."
            cd ~/ai-pilot-web-chat || exit 1
            echo "📁 In directory: $(pwd)"

            # Сбрасываем локальные изменения
            git stash --include-untracked || true
            git clean -fd || true
            git pull origin main
            echo "✅ Git updated"

            # Docker сеть
            docker network create aipilot 2>/dev/null || echo "Network exists"

            # === Веб-чат ===
            echo "🔨 Building Docker image..."
            docker build -t ai-pilot-chat . || exit 1
            echo "✅ Image built"

            echo "🛑 Stopping old container..."
            docker rm -f ai-pilot-chat 2>/dev/null || echo "No old container"

            echo "🚀 Starting new container..."
            docker run -d \
              --name ai-pilot-chat \
              --restart unless-stopped \
              --network aipilot \
              --add-host host.docker.internal:host-gateway \
              -p 127.0.0.1:3000:80 \
              ai-pilot-chat || exit 1

            docker image prune -f
            echo "✅ Deploy complete: $(date)"
