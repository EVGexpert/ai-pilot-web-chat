name: Auto Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ✅ Используем GitHub Secrets
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: JWT_SECRET,GATEWAY_TOKEN
          timeout: 120
          script: |
            set -e
            cd ~/ai-pilot-web-chat

            # Сбрасываем локальные изменения
            git stash --include-untracked
            git clean -fd
            git pull origin main

            # Docker сеть
            docker network create aipilot 2>/dev/null || true

            # === Auth API (деплоится отдельно через ai-pilot-auth-api repo!) ===
            echo "⏩ Auth API не деплоится отсюда — используйте EVGexpert/ai-pilot-auth-api"

            # === Веб-чат ===
            docker build -t ai-pilot-chat .
            docker rm -f ai-pilot-chat 2>/dev/null || true
            docker run -d \
              --name ai-pilot-chat \
              --restart unless-stopped \
              --network aipilot \
              --add-host host.docker.internal:host-gateway \
              -p 127.0.0.1:3000:80 \
              ai-pilot-chat

            docker image prune -f
            echo "✅ Deploy complete: $(date)"
