name: Auto Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd ~/ai-pilot-web-chat
            git pull origin main

            # === Auth API ===
            docker build -t ai-pilot-auth auth-api/ || echo "⚠️ Auth build failed, trying existing image"
            docker rm -f ai-pilot-auth 2>/dev/null || true
            docker run -d \
              --name ai-pilot-auth \
              --restart unless-stopped \
              --add-host host.docker.internal:host-gateway \
              -p 127.0.0.1:3001:3001 \
              -v "$(pwd)/auth-data:/app/data" \
              -e PORT=3001 \
              -e JWT_SECRET=dev-jwt-secret-change-in-production \
              -e GATEWAY_TOKEN=dev-gateway-token \
              -e GATEWAY_WS=ws://host.docker.internal:18789 \
              -e APP_URL=https://pilotsite.ru \
              ai-pilot-auth || echo "⚠️ Auth container start failed"

            # === Веб-чат ===
            docker build -t ai-pilot-chat .
            docker rm -f ai-pilot-chat 2>/dev/null || true
            docker run -d \
              --name ai-pilot-chat \
              --restart unless-stopped \
              --add-host host.docker.internal:host-gateway \
              -p 127.0.0.1:3000:80 \
              ai-pilot-chat

            docker image prune -f
            echo "✅ Deploy complete: $(date)"
