name: Auto Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          timeout: 120s
          script: |
            set -e
            cd ~/ai-pilot-web-chat

            # Сбрасываем локальные изменения
            git stash --include-untracked
            git clean -fd
            git pull origin main

            # Docker сеть
            docker network create aipilot 2>/dev/null || true

            # === Auth API ===
            docker build -t ai-pilot-auth auth-api/
            docker rm -f ai-pilot-auth 2>/dev/null || true
            docker run -d \
              --name ai-pilot-auth \
              --restart unless-stopped \
              --network aipilot \
              --add-host host.docker.internal:host-gateway \
              -p 127.0.0.1:3001:3001 \
              -v /root/ai-pilot-web-chat/auth-data:/app/data \
              -e PORT=3001 \
              -e JWT_SECRET=dev-jwt-secret-change-in-production \
              -e GATEWAY_TOKEN=f8186e8d77460feeb735a8dbc48e659c9b05c7f10b114fd554d6fd7a8f8e76e3 \
              -e GATEWAY_WS=ws://host.docker.internal:18789 \
              -e APP_URL=https://pilotsite.ru \
              ai-pilot-auth

            # === Веб-чат ===
            docker build -t ai-pilot-chat .
            docker rm -f ai-pilot-chat 2>/dev/null || true
            docker run -d \
              --name ai-pilot-chat \
              --restart unless-stopped \
              --network aipilot \
              --add-host host.docker.internal:host-gateway \
              -p 127.0.0.1:3000:80 \
              ai-pilot-chat

            docker image prune -f
            echo "✅ Deploy complete: $(date)"
