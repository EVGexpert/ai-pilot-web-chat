name: Auto Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}
          log-public-key: false

      - name: Add host to known_hosts
        run: ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Test SSH Connection
        run: |
          echo "Testing connection to ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}..."
          ssh -v ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "echo 'SSH OK'" 2>&1 | head -30

      - name: Deploy via SSH
        run: |
          echo "Connecting to ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}..."
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            set -e
            echo "🚀 Starting deployment..."
            cd ~/ai-pilot-web-chat

            # Сбрасываем локальные изменения
            git stash --include-untracked || true
            git clean -fd || true
            git pull origin main
            echo "✅ Git updated"

            # Docker сеть
            docker network create aipilot 2>/dev/null || echo "Network exists"

            # === Веб-чат ===
            echo "🔨 Building Docker image..."
            docker build -t ai-pilot-chat .
            echo "✅ Image built"

            echo "🛑 Stopping old container..."
            docker rm -f ai-pilot-chat 2>/dev/null || echo "No old container"

            echo "🚀 Starting new container..."
            docker run -d \
              --name ai-pilot-chat \
              --restart unless-stopped \
              --network aipilot \
              --add-host host.docker.internal:host-gateway \
              -p 127.0.0.1:3000:80 \
              ai-pilot-chat

            docker image prune -f
            echo "✅ Deploy complete: $(date)"
          EOF
