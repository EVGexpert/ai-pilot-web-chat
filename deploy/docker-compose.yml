services:
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw
    restart: unless-stopped
    ports:
      - "127.0.0.1:18789:18789"
    volumes:
      - openclaw_data:/home/node/.openclaw
    environment:
      - TZ=Europe/Kaliningrad

  web-chat:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: ai-pilot-chat
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:80"
    environment:
      - TZ=Europe/Kaliningrad

  auth-api:
    build:
      context: ../auth-api
      dockerfile: Dockerfile
    container_name: ai-pilot-auth-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - auth_data:/app/data
    environment:
      - TZ=Europe/Kaliningrad
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-me}
      - APP_URL=https://pilotsite.ru
      - GATEWAY_TOKEN=${GATEWAY_TOKEN:-dev-gateway-token}
      - GATEWAY_HTTP=${GATEWAY_HTTP:-https://pilotsite.ru}

volumes:
  openclaw_data:
  auth_data:
